# 중금속 흡착 필터 추천 서비스 — 백엔드 + 프론트엔드 통합 실행
#
# 로컬 실행:
#   docker compose up --build
#   → 프론트엔드 http://localhost:3000 · 백엔드 http://localhost:8000/docs
#
# 운영 배포 시 아래 값을 실제 공개 주소로 바꾸세요(.env 또는 환경 변수):
#   PUBLIC_API_URL   : 브라우저가 접근할 백엔드 주소 (프론트 빌드에 주입됨)
#   ALLOWED_ORIGINS  : 백엔드 CORS 허용 출처(프론트 공개 주소)

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: filter-recommendation-api:1.0.0
    ports:
      - "8000:8000"
    environment:
      DB_PATH: /app/db
      MODEL_VERSION: "1.0"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      LOG_LEVEL: INFO
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else sys.exit(1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 같은 출처 프록시: 브라우저는 /api/* 를 자기 출처(3000)로 호출 → Next가 백엔드로 전달.
        # 덕분에 Tailscale 등으로 3000 하나만 열어도 백엔드 fetch가 동작한다.
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_DB_VERSION: "1.0"
        BACKEND_INTERNAL_URL: http://backend:8000
    image: filter-recommendation-web:1.0.0
    environment:
      # Next 서버 → 백엔드(컨테이너 네트워크) 프록시 대상
      BACKEND_INTERNAL_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
